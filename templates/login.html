<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - HSE AI Platform</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f4c3a 0%, #1a5c4a 50%, #0d3a2e 100%);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* HSE Safety Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(56, 189, 248, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 197, 94, 0.3);
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        h2 {
            margin-bottom: 30px;
            color: #4ade80;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.95);
            color: #0f4c3a;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.6);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            font-weight: bold;
        }
        button:hover {
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.5);
            transform: translateY(-2px);
        }
        .company-info {
            background: rgba(34, 197, 94, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #22c55e;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .back-link:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.8);
        }
        .error-message {
            background: rgba(211, 47, 47, 0.9);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f44336;
        }
        .links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .links a {
            flex: 1;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>🔐 Admin Dashboard Login</h2>

        <div class="company-info">
            <strong>Company:</strong> {{ company.title() }}<br>
            <small>Enter your company and admin credentials to access your dashboard</small>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form id="loginForm" method="POST" action="/login">
            <input id="company" name="company" type="text" placeholder="Company Name" value="{{ company }}" required><br><br>
            <input id="username" name="username" placeholder="Admin Username" required><br><br>
            <input id="password" name="password" type="password" placeholder="Admin Password" required><br><br>

            <button type="submit">🔓 Login to Dashboard</button>
        </form>

        <div class="links">
            <a href="/register?company={{ company }}" class="back-link">🆕 Create Account</a>
            <a href="/?company={{ company }}" class="back-link">← Back to Main System</a>
        </div>
    </div>

    <script>
        document.getElementById('company').focus();
    </script>
</body>
</html>

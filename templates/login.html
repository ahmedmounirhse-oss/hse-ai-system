<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - HSE AI Platform</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            margin-bottom: 30px;
            color: white;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        .company-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #4CAF50;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>🔐 Admin Dashboard Login</h2>

        <div class="company-info">
            <strong>Company:</strong> {{ company.title() }}<br>
            <small>Enter your admin credentials to access the dashboard</small>
        </div>

        <form method="POST" action="/login">
            <input type="hidden" name="company" value="{{ company }}">

            <input name="username" placeholder="Admin Username" required><br><br>
            <input name="password" type="password" placeholder="Admin Password" required><br><br>

            <button type="submit">🔓 Login to Dashboard</button>
        </form>

        <a href="/?company={{ company }}" class="back-link">← Back to Main System</a>
    </div>
</body>
</html>

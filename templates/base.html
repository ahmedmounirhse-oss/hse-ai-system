<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI HSE DSS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #0f4c3a 0%, #1a5c4a 50%, #0d3a2e 100%);
  background-attachment: fixed;
  color:white;
  font-family:Segoe UI;
  position: relative;
}

/* HSE Background Pattern */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(56, 189, 248, 0.1) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container, .content {
  position: relative;
  z-index: 1;
}
</style>

</head>

<body>

<!-- 🔥 HEADER -->
<div style="background: linear-gradient(90deg, #065f46 0%, #047857 50%, #059669 100%);padding:20px;text-align:center;box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);position: relative;z-index: 1;">

  <h2 style="color:#4ade80;font-weight:bold;text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);">
    🤖 AI HSE Decision Support System
  </h2>

  <div style="margin-top:10px;">

    <a href="/" style="margin:10px;color:white;text-decoration:none;transition: all 0.3s ease;" onmouseover="this.style.color='#4ade80'" onmouseout="this.style.color='white'">📋 HSE Report</a>
    <a href="/dashboard" style="margin:10px;color:white;text-decoration:none;transition: all 0.3s ease;" onmouseover="this.style.color='#4ade80'" onmouseout="this.style.color='white'">📊 Dashboard</a>
    <a href="/risk-assessment" style="margin:10px;color:white;text-decoration:none;transition: all 0.3s ease;" onmouseover="this.style.color='#4ade80'" onmouseout="this.style.color='white'">⚠️ Risk Assessment</a>
    <a href="/investigation" style="margin:10px;color:#86efac;font-weight:bold;text-decoration:none;border-bottom: 2px solid #86efac;padding-bottom: 5px;">
      🔍 Incident Investigation
    </a>

  </div>

</div>

<!-- 🔥 CONTENT -->
<div class="container mt-4">
{% block content %}{% endblock %}
</div>

</body>
</html>

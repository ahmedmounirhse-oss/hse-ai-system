<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI HSE DSS - Incident Investigation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Segoe UI;
}
.container {
  margin-top:40px;
}
.card {
  background:#020617;
  padding:25px;
  border-radius:15px;
}
input, select, textarea {
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- 🔥 HEADER (اتصلّح واتحط في مكانه الصح) -->
<div style="background:#020617;padding:20px;text-align:center;">

  <h2 style="color:#22c55e;font-weight:bold;">
    🤖 AI HSE Decision Support System
  </h2>

  <div style="margin-top:10px;">

    <a href="/" style="margin:10px;color:white;text-decoration:none;">
      📋 Safety Observation & Reporting 
    </a>

    <a href="/dashboard" style="margin:10px;color:white;text-decoration:none;">
      📊 Dashboard
    </a>

    <a href="/risk-assessment" style="margin:10px;color:white;text-decoration:none;">
      ⚠️ Risk Assessment
    </a>

    <a href="/investigation" style="margin:10px;color:#facc15;font-weight:bold;text-decoration:none;">
      🔍 Incident Investigation
    </a>

  </div>

</div>

<!-- 🔥 CONTENT -->
<div class="container">

<h2>🔍 AI Incident Investigation</h2>

<select id="report-select" class="form-control mb-3"></select>

<label>Or write your own incident:</label>
<textarea id="custom-desc" class="form-control mb-3" placeholder="Describe the incident..."></textarea>

<label>Upload Incident Image (optional):</label>
<input type="file" id="image" class="form-control mb-3">

<button onclick="runInvestigation()" class="btn btn-danger">
Run AI Investigation
</button>

<div id="result" class="mt-4"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const COMPANY = params.get("company");

if (!COMPANY) {
    const currentPath = window.location.pathname;
    window.location.href = currentPath + "?company=default";
}

const originalFetch = window.fetch;

window.fetch = function(url, options = {}) {
    if (typeof url === "string" && !url.includes("company=")) {
        if (url.includes("?")) {
            url += "&company=" + COMPANY;
        } else {
            url += "?company=" + COMPANY;
        }
    }
    return originalFetch(url, options);
};

document.querySelectorAll("a[href^='/']").forEach(link => {
    link.addEventListener("click", function(e){
        e.preventDefault();
        window.location.href = this.getAttribute("href") + "?company=" + COMPANY;
    });
});

let lastResult = null;

// ================= LOAD REPORTS =================
async function loadReports(){
    try {
let res = await fetch('/reports');
        let data = await res.json();

        document.getElementById("report-select").innerHTML =
            data.map(r => `<option value="${r.description}">
                ${r.location} - ${r.description}
            </option>`).join('');
    } catch(e){
        console.log("Error loading reports", e);
    }
}

// ================= RUN AI INVESTIGATION =================
async function runInvestigation(){

    let selected = document.getElementById("report-select").value;
    let custom = document.getElementById("custom-desc").value;
    let file = document.getElementById("image").files[0];

    let desc = custom && custom.trim() !== "" ? custom : selected;

    if(!desc){
        alert("Enter or select incident");
        return;
    }

    try {

        let res = await fetch('/investigate', {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({description: desc})
        });

        let data = await res.json();

        let imagePath = "";

        if(file){
            let formData = new FormData();
            formData.append("image", file);

            let upload = await fetch('/upload_image', {
                method:"POST",
                body: formData
            });

            let imgRes = await upload.json();
            imagePath = imgRes.path;
        }

        lastResult = { description: desc, image: imagePath, ...data };

        document.getElementById("result").innerHTML = `
        <div style="background:#fff;color:black;padding:20px;border-radius:10px;">
            
        <h4>🧠 5 Whys</h4>
        ${data.whys.map((w,i)=> {
            if(w.toLowerCase().startsWith("why")){
                return `<div><b>${Math.floor(i/2)+1}. ${w}</b></div>`;
            } else {
                return `<div style="margin-left:20px;">${w}</div>`;
            }
        }).join('')}

        <h4 class="mt-3">🎯 Root Cause</h4>
        <p>${data.root_cause}</p>

        <h4>🔧 Corrective Actions</h4>
        ${data.corrective_actions.map(a=>`<div>- ${a}</div>`).join('')}

        <h4 class="mt-3">🛡️ Preventive Actions</h4>
        ${data.preventive_actions.map(a=>`<div>- ${a}</div>`).join('')}

        <button onclick="downloadPDF()" class="btn btn-success mt-3">
        📄 Download PDF
        </button>

        </div>
        `;

    } catch(e){
        console.log("Investigation error", e);
    }
}

// ================= DOWNLOAD PDF =================
async function downloadPDF(){

    if(!lastResult){
        alert("Run investigation first");
        return;
    }

    try {
        let res = await fetch('/investigation_pdf', {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify(lastResult)
        });

        let blob = await res.blob();
        let url = window.URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = "investigation.pdf";
        a.click();

    } catch(e){
        console.log("PDF error", e);
    }
}

// ================= INIT =================
loadReports();

</script>

</body>
</html>

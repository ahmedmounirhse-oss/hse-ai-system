<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI HSE DSS - Incident Investigation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #1a2a4a 0%, #2d3e5f 50%, #1a2a4a 100%);
  background-attachment: fixed;
  color:white;
  font-family:Segoe UI;
  position: relative;
}

/* HSE Investigation/Risk Pattern */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(239, 68, 68, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  margin-top:40px;
  position: relative;
  z-index: 1;
}

.card {
  background: linear-gradient(135deg, #2d3e5f 0%, #1a2a4a 100%);
  padding:25px;
  border-radius:15px;
  border: 2px solid rgba(239, 68, 68, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

input, select, textarea {
  margin-bottom:10px;
  background: rgba(255, 255, 255, 0.95);
  color: #1a2a4a;
  border: 1px solid rgba(239, 68, 68, 0.2);
  border-radius: 8px;
  padding: 10px;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
}
</style>
</head>

<body>

<!-- 🔥 HEADER (HSE Investigation Theme) -->
<div style="background: linear-gradient(90deg, #1a2a4a 0%, #2d3e5f 50%, #1a3a4a 100%);padding:20px;text-align:center;box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);position: relative;z-index: 1;">

  <h2 style="color:#3b82f6;font-weight:bold;text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);">
    🤖 AI HSE Decision Support System
  </h2>

  <div style="margin-top:10px;">

    <a href="/" style="margin:10px;color:white;text-decoration:none;transition: all 0.3s ease;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='white'">
      📋 Safety Observation & Reporting 
    </a>

    <a href="/companies" style="margin:10px;color:white;text-decoration:none;transition: all 0.3s ease;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='white'">
      🏢 Companies
    </a>

    <a href="/risk-assessment" style="margin:10px;color:white;text-decoration:none;transition: all 0.3s ease;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='white'">
      ⚠️ Risk Assessment
    </a>

    <a href="/investigation" style="margin:10px;color:#60a5fa;font-weight:bold;text-decoration:none;border-bottom: 2px solid #60a5fa;padding-bottom: 5px;">
      🔍 Incident Investigation
    </a>

  </div>

</div>

<!-- 🔥 CONTENT -->
<div class="container">

<h2>🔍 AI Incident Investigation</h2>

<select id="report-select" class="form-control mb-3"></select>

<label>Or write your own incident:</label>
<textarea id="custom-desc" class="form-control mb-3" placeholder="Describe the incident..."></textarea>

<label>Upload Incident Image (optional):</label>
<input type="file" id="image" class="form-control mb-3">

<button onclick="runInvestigation()" class="btn btn-danger">
Run AI Investigation
</button>

<div id="result" class="mt-4"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const COMPANY = params.get("company");

if (!COMPANY) {
    const currentPath = window.location.pathname;
    window.location.href = currentPath + "?company=default";
}

const originalFetch = window.fetch;

window.fetch = function(url, options = {}) {
    if (typeof url === "string" && !url.includes("company=")) {
        if (url.includes("?")) {
            url += "&company=" + COMPANY;
        } else {
            url += "?company=" + COMPANY;
        }
    }
    return originalFetch(url, options);
};

document.querySelectorAll("a[href^='/']").forEach(link => {
    link.addEventListener("click", function(e){
        e.preventDefault();
        window.location.href = this.getAttribute("href") + "?company=" + COMPANY;
    });
});

let lastResult = null;

// ================= LOAD REPORTS =================
async function loadReports(){
    try {
let res = await fetch('/reports');
        let data = await res.json();

        document.getElementById("report-select").innerHTML =
            data.map(r => `<option value="${r.description}">
                ${r.location} - ${r.description}
            </option>`).join('');
    } catch(e){
        console.log("Error loading reports", e);
    }
}

// ================= RUN AI INVESTIGATION =================
async function runInvestigation(){

    let selected = document.getElementById("report-select").value;
    let custom = document.getElementById("custom-desc").value;
    let file = document.getElementById("image").files[0];

    let desc = custom && custom.trim() !== "" ? custom : selected;

    if(!desc){
        alert("Enter or select incident");
        return;
    }

    try {

        let res = await fetch('/investigate', {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({description: desc})
        });

        let data = await res.json();

        let imagePath = "";

        if(file){
            let formData = new FormData();
            formData.append("image", file);

            let upload = await fetch('/upload_image', {
                method:"POST",
                body: formData
            });

            let imgRes = await upload.json();
            imagePath = imgRes.path;
        }

        lastResult = { description: desc, image: imagePath, ...data };

        document.getElementById("result").innerHTML = `
        <div style="background:#fff;color:black;padding:20px;border-radius:10px;">
            
        <h4>🧠 5 Whys</h4>
        ${data.whys.map((w,i)=> {
            if(w.toLowerCase().startsWith("why")){
                return `<div><b>${Math.floor(i/2)+1}. ${w}</b></div>`;
            } else {
                return `<div style="margin-left:20px;">${w}</div>`;
            }
        }).join('')}

        <h4 class="mt-3">🎯 Root Cause</h4>
        <p>${data.root_cause}</p>

        <h4>🔧 Corrective Actions</h4>
        ${data.corrective_actions.map(a=>`<div>- ${a}</div>`).join('')}

        <h4 class="mt-3">🛡️ Preventive Actions</h4>
        ${data.preventive_actions.map(a=>`<div>- ${a}</div>`).join('')}

        <button onclick="downloadPDF()" class="btn btn-success mt-3">
        📄 Download PDF
        </button>

        </div>
        `;

    } catch(e){
        console.log("Investigation error", e);
    }
}

// ================= DOWNLOAD PDF =================
async function downloadPDF(){

    if(!lastResult){
        alert("Run investigation first");
        return;
    }

    try {
        let res = await fetch('/investigation_pdf', {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify(lastResult)
        });

        let blob = await res.blob();
        let url = window.URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = "investigation.pdf";
        a.click();

    } catch(e){
        console.log("PDF error", e);
    }
}

// ================= INIT =================
loadReports();

</script>

</body>
</html>

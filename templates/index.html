<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI HSE DSS - Safety Observation & Reporting</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background: linear-gradient(135deg, #0f4c3a 0%, #1a5c4a 50%, #0d3a2e 100%);
  background-attachment: fixed;
  color:white;
  position: relative;
}

/* HSE Safety/Health Pattern */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 50% 0%, rgba(34, 197, 94, 0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.header{
  background: linear-gradient(90deg, #065f46 0%, #047857 50%, #059669 100%);
  padding:20px;
  text-align:center;
  position: relative;
  z-index: 1;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.header h1{
  margin:0;
  color:#4ade80;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
}

.tabs{
  margin-top:10px;
}

.tabs a{
  color:white;
  text-decoration:none;
  margin:0 10px;
  font-weight:bold;
  transition: all 0.3s ease;
}

.tabs a:hover {
  color: #4ade80;
  transform: scale(1.05);
}

.tabs a.active{
  color:#facc15;
  border-bottom: 2px solid #facc15;
  padding-bottom: 5px;
}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:calc(100vh - 140px);
  position: relative;
  z-index: 1;
}

.card{
  background: linear-gradient(135deg, #1a5c4a 0%, #0f4c3a 100%);
  background-attachment: fixed;
  padding:25px;
  border-radius:15px;
  width:400px;
  border: 2px solid rgba(34, 197, 94, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background: rgba(255, 255, 255, 0.9);
  color: #0f4c3a;
}

input:focus, textarea:focus {
  outline: none;
  box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
}

button{
  width:100%;
  padding:12px;
  background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-weight: bold;
  transition: all 0.3s ease;
}

button:hover {
  box-shadow: 0 4px 15px rgba(34, 197, 94, 0.5);
  transform: translateY(-2px);
}

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-content{
  background: linear-gradient(135deg, #1a5c4a 0%, #0f4c3a 100%);
  padding:25px;
  border-radius:15px;
  width:400px;
  max-height:80vh;
  overflow:auto;
  border: 2px solid rgba(34, 197, 94, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
}

.close{
  float:right;
  cursor:pointer;
  color:#ff6b6b;
  font-size:20px;
  font-weight: bold;
}

.close:hover {
  color: #ff8787;
}
</style>
</style>

</head>

<body>

<!-- 🔥 HEADER (موحد ومتظبط) -->
<div class="header">
  <h1>🤖 AI HSE Decision Support System</h1>

  <div class="tabs">
    <a href="/companies">🏢 Companies</a> |
    <a href="/" class="active">📋 Safety Observation & Reporting</a> |
    <a href="/dashboard">📊 Dashboard</a> |
    <a href="/risk-assessment">⚠️ Risk Assessment</a> |
    <a href="/investigation">🔍 Incident Investigation</a>
  </div>
</div>

<!-- 🔥 CONTENT -->
<div class="container">

<div class="card">

<h2>Safety Observation & Reporting</h2>

<form id="form">

<input type="text" name="name" placeholder="👤 Worker Name" required>
<input type="text" name="emp" placeholder="🆔 Employee ID" required>

<textarea name="description" placeholder="Describe the hazard... (optional if image)"></textarea>

<input type="text" name="location" placeholder="📍 Location" required>

<input type="file" name="image" accept="image/*">



<button type="submit" id="submitBtn">Submit Report</button>

</form>

</div>

</div>

<!-- 🔥 POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close" id="closeBtn">✖</span>
    <div id="popupResult"></div>
  </div>
</div>

<!-- 🔥 DEVELOPER CREDIT -->
<div style="position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#020617;padding:8px 16px;border-radius:20px;font-size:12px;color:#94a3b8;text-align:center;border:1px solid #334155;">
  Developed By: Ahmed Mounir
</div>

<script>
const params = new URLSearchParams(window.location.search);
const COMPANY = params.get("company");

if (!COMPANY) {
    const currentPath = window.location.pathname;
    window.location.href = currentPath + "?company=default";
}

const originalFetch = window.fetch;

window.fetch = function(url, options = {}) {
    if (typeof url === "string" && !url.includes("company=")) {
        if (url.includes("?")) {
            url += "&company=" + COMPANY;
        } else {
            url += "?company=" + COMPANY;
        }
    }
    return originalFetch(url, options);
};

document.querySelectorAll("a[href^='/']").forEach(link => {
    link.addEventListener("click", function(e){
        e.preventDefault();
        window.location.href = this.getAttribute("href") + "?company=" + COMPANY;
    });
});

document.getElementById("form").onsubmit = async function(e){
  e.preventDefault();

  const button = document.getElementById("submitBtn");
  button.innerText = "Analyzing...";
  button.disabled = true;

  let formData = new FormData(this);

  try {

    let res = await fetch('/submit',{
      method:"POST",
      body:formData
    });

    if (!res.ok) {
      throw new Error(`HTTP error! status: ${res.status}`);
    }

    let data = await res.json();

    console.log("Response data:", data);

    document.getElementById("popup").style.display = "flex";

    document.getElementById("popupResult").innerHTML = `

    <h3>🤖 AI Analysis</h3>

    <div style="background:#022c22;padding:12px;border-radius:10px;margin-bottom:10px;">
    ${data.message_ar ? data.message_ar : "شكراً لمشاركتك تم اضافة 10 نقاط الى رصيدك فى المنافسة على جائزة رجل السلامة لهذا الشهر 👏"}
    </div>

    <div style="background:#1e293b;padding:12px;border-radius:10px;margin-bottom:10px;">
    ${data.message_en ? data.message_en : "Thank you 👏 10 points have been added to your score for this month's Safety Award competition"}
    </div>

    <hr>

<b>📊 Hazard:</b> ${data.hazard || "General"}<br>
<b>📌 Status:</b> Submitted<br>
<b>⚠ Severity:</b> ${data.severity || "Not defined"}<br>
<b>📈 Score:</b> ${data.risk_score || "0"}<br>
<b>🏆 Points Awarded:</b> ${data.points_awarded || 10}<br><br>

<b>🤖 Recommendation:</b><br>
${data.recommendation || "No recommendation"}<br><br>

<b>🧠 Why (AI Justification):</b><br>
${data.justification ? data.justification : "AI analysis completed"}

<hr>

👤 ${formData.get("name")}<br>
🆔 ${formData.get("emp")}

    `;

  } catch(err){
    console.error(err);
    alert("Server error ⚠");
  }

  button.innerText = "Submit Report";
  button.disabled = false;
};

document.getElementById("closeBtn").addEventListener("click", function(){
  document.getElementById("popup").style.display = "none";
});

</script>

</body>
</html>

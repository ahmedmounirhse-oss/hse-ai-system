<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password - HSE AI Platform</title>
<style>
body {
    background: linear-gradient(135deg, #0f4c3a 0%, #1a5c4a 50%, #0d3a2e 100%);
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
}
.container {
    width: 100%;
    max-width: 430px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
}
h1 {
    margin-top: 0;
    color: #a5f3fc;
}
input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: none;
    margin-bottom: 16px;
    font-size: 16px;
    background: rgba(255,255,255,0.95);
    color: #0f172a;
}
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
    color: white;
    font-size: 16px;
    cursor: pointer;
    font-weight: 700;
}
button:hover {
    opacity: 0.95;
}
.message {
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 16px;
}
.success { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.35); color: #ecfccb; }
.error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.35); color: #fee2e2; }
.back-link {
    display: inline-block;
    margin-top: 12px;
    color: #a5f3fc;
    text-decoration: none;
}
.back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
    <h1>🔑 Change Password</h1>
    <p style="color:#d1fae5;">Logged in as <strong>{{ username }}</strong> for <strong>{{ company.title() }}</strong></p>
    <div id="message"></div>

    <form id="passwordForm">
        <input type="password" name="current_password" placeholder="Current Password" required>
        <input type="password" name="new_password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
        <button type="submit">Update Password</button>
    </form>
    <a href="/dashboard" class="back-link">← Back to Dashboard</a>
</div>

<script>
const form = document.getElementById('passwordForm');
const messageEl = document.getElementById('message');

form.addEventListener('submit', async function(e) {
    e.preventDefault();
    messageEl.innerHTML = '';

    const formData = new FormData(form);
    const data = new URLSearchParams();
    for (const [key, value] of formData.entries()) {
        data.append(key, value);
    }

    try {
        const res = await fetch('/change-password', {
            method: 'POST',
            body: data
        });
        const result = await res.json();
        const className = result.success ? 'success' : 'error';
        messageEl.innerHTML = `<div class="message ${className}">${result.message || 'An error occurred'}</div>`;
        if (result.success) {
            form.reset();
        }
    } catch (err) {
        messageEl.innerHTML = `<div class="message error">❌ ${err.message}</div>`;
    }
});
</script>
</body>
</html>
